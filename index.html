<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Byteblade Pack Simulator</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#020617,#0f172a);
  color:white;
  text-align:center;
}

button {
  padding:10px 20px;
  margin:10px;
  background:#6366f1;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

#results {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  width:120px;
  height:170px;
  margin:10px;
  perspective:1000px;
}

.inner {
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:0.6s;
}

.flipped {
  transform:rotateY(180deg);
}

.front, .back {
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:10px;
}

.front { background:#111; }
.back { transform:rotateY(180deg); }

.back img {
  width:100%;
  height:100%;
  border-radius:10px;
}

.UR { box-shadow:0 0 30px gold; animation:shake 0.5s infinite; }
.SR { box-shadow:0 0 20px violet; }
.R { box-shadow:0 0 10px deepskyblue; }

@keyframes shake {
  0%{transform:rotateY(180deg) translateX(0);}
  50%{transform:rotateY(180deg) translateX(5px);}
  100%{transform:rotateY(180deg) translateX(-5px);}
}

/* VIEWER */
#viewer {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

#viewerContent {
  background:#111;
  padding:20px;
  border-radius:12px;
  width:300px;
}
#viewerContent img { width:100%; }
</style>
</head>

<body>

<h1>🔥 Byteblade Pack Simulator</h1>

<button onclick="openPack(1)">1 Pack</button>
<button onclick="openPack(5)">5 Packs</button>
<button onclick="openPack(10)">10 Packs</button>

<div id="results"></div>

<div id="viewer" onclick="closeViewer()">
  <div id="viewerContent">
    <img id="vImg">
    <h2 id="vName"></h2>
    <p id="vStats"></p>
    <p id="vEffect"></p>
  </div>
</div>

<script>

const cards = [

{ name:"Byteblade Initiate", rarity:"R", img:"https://i.imgur.com/A6bjtgJ.png",
effect:"If you control no monsters: Special Summon this card. If sent to GY: Add 1 Byteblade card.",
atk:1200, def:800 },

{ name:"Byteblade Slicer", rarity:"R", img:"https://i.imgur.com/hvbqeZw.png",
effect:"Special Summon if only Byteblade monsters. Summon: Special Summon 1 Byteblade.",
atk:1500, def:1000 },

{ name:"Byteblade Vanguard", rarity:"R", img:"https://i.imgur.com/CFANwSb.png",
effect:"Banish from GY: Add 1 Byteblade Spell/Trap.",
atk:1000, def:1000 },

{ name:"Byteblade Root Access Kernel", rarity:"SR", img:"https://i.imgur.com/CFANwSb.png",
effect:"Send Cyberse to GY; Special Summon this. Add Byteblade from GY.",
atk:1800, def:0 },

{ name:"Byteblade Crusader", rarity:"SR", img:"https://i.imgur.com/CbeOYmF.png",
effect:"Quick: Send Byteblade; Special Summon. Summon: Special Summon from Deck.",
atk:2000, def:1800 },

{ name:"Byteblade Hacker", rarity:"SR", img:"https://i.imgur.com/xIbjKpE.png",
effect:"Revive Link. Draw when Cyberse summoned.",
atk:2000, def:0 },

{ name:"Byteblade Encoder", rarity:"SR", img:"https://i.imgur.com/Sb4i68Q.png",
effect:"Discard: Add Byteblade. Summon from Deck negated.",
atk:2200, def:0 },

{ name:"Byteblade Overclock", rarity:"UR", img:"https://i.imgur.com/zVoiXER.png",
effect:"Negate anything by sending Cyberse.",
atk:2800, def:0 },

{ name:"Byteblade System Dragbit", rarity:"UR", img:"https://i.imgur.com/hl5dw5P.png",
effect:"Summon 2. Negate spells/traps.",
atk:3000, def:0 }

];

const rates = {UR:0.02, SR:0.08, R:0.3, C:0.6};

function getRarity(){
let r=Math.random();
if(r<rates.UR)return"UR";
if(r<rates.UR+rates.SR)return"SR";
if(r<rates.UR+rates.SR+rates.R)return"R";
return"C";
}

function openPack(count){
const res=document.getElementById("results");
res.innerHTML="";

for(let i=0;i<count;i++){
for(let j=0;j<5;j++){

let rarity=getRarity();
let pool=cards.filter(c=>c.rarity===rarity);
if(pool.length===0) pool=cards;

let card=pool[Math.floor(Math.random()*pool.length)];

let div=document.createElement("div");
div.className="card";

let inner=document.createElement("div");
inner.className="inner";

inner.innerHTML=`
<div class="front"></div>
<div class="back ${rarity}">
<img src="${card.img}">
</div>
`;

div.appendChild(inner);
res.appendChild(div);

setTimeout(()=>inner.classList.add("flipped"),100*j);

div.onclick=()=>showCard(card);
}
}
}

function showCard(card){
document.getElementById("viewer").style.display="flex";
document.getElementById("vImg").src=card.img;
document.getElementById("vName").innerText=card.name;
document.getElementById("vStats").innerText=`ATK ${card.atk} / DEF ${card.def}`;
document.getElementById("vEffect").innerText=card.effect;
}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}

</script>

</body>
</html>
