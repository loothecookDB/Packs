<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Generation RCY Pack Opener</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    background: url('https://cdn.discordapp.com/attachments/1398179743496536168/1483585527700652032/IMG_4088.jpeg?ex=69bb2031&is=69b9ceb1&hm=a8733bdc401869b2be45f4de58dc8b7dd8050e2645ab8cf99f9db05de596f451') center/cover no-repeat fixed;
    display: flex;
  }
  /* Sidebar */
  #sidebar {
    width: 180px;
    background: rgba(0,0,0,0.85);
    border-right: 2px solid #ff0000;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    box-shadow: 2px 0 20px #ff0000 inset;
  }
  #sidebar h2 {
    color: #ff0000;
    text-shadow: 0 0 10px #ff0000;
    font-size: 1.5em;
    margin-bottom: 30px;
  }
  .sidebar-btn {
    width: 140px;
    margin: 10px 0;
    padding: 10px;
    background: #111;
    border: 2px solid #ff0000;
    border-radius: 10px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .sidebar-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ff0000, 0 0 40px #ff5555 inset;
  }
  /* Main content */
  #main-content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
  }
  .section { display: none; }
  .active { display: block; }
  /* Pack opener */
  #rcy-box {
    width: 100px;
    height: 160px;
    margin: 30px auto;
    background: url('https://i.imgur.com/Zm6b8fF.png') center/cover no-repeat;
    border-radius: 15px;
    border: 3px solid #ff0000;
    box-shadow: 0 0 40px #ff0000 inset, 0 0 80px #ff5555;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 32px;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.6s ease, box-shadow 0.3s ease;
  }
  #rcy-box::before {
    content: "1";
    position: absolute;
    top: 8px;
    left: 8px;
    font-size: 24px;
    color: #fff;
    text-shadow: 0 0 5px #ff0000;
  }
  #rcy-box:hover::after {
    transform: translateX(100%) rotate(25deg);
  }
  #rcy-box:hover {
    transform: rotateY(360deg) scale(1.1) rotateZ(5deg);
    box-shadow: 0 0 60px #ff0000 inset, 0 0 120px #ff7777;
  }
  /* Buttons */
  button.open-btn {
    margin: 5px;
    padding: 12px 18px;
    font-size: 16px;
    cursor: pointer;
    border: 2px solid #ff0000;
    border-radius: 10px;
    background: #111;
    color: #fff;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  button.open-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ff0000, 0 0 40px #ff5555 inset;
  }
  /* Card displays */
  #recent-pack, #collection {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 900px;
    margin-top: 20px;
  }
  .card {
    width: 120px;
    margin: 10px;
    border: 2px solid #fff;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.3s ease;
  }
  .card:hover { transform: scale(1.1); }
  /* Modal */
  #card-modal {
    display: none;
    position: fixed;
    top:0; left:0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    z-index: 999;
  }
  #card-modal-content {
    background: #111;
    padding: 20px;
    border: 2px solid #ff0000;
    border-radius: 15px;
    color: #fff;
    max-width: 400px;
    text-align: center;
    position: relative;
  }
  #card-modal-content img { max-width: 200px; margin: 10px; }
  #card-modal-content .close { position: absolute; top: 5px; right: 10px; cursor: pointer; font-size: 20px; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>RCY Menu</h2>
  <div class="sidebar-btn" onclick="showSection('pack-opener')">Pack Opener</div>
  <div class="sidebar-btn" onclick="showSection('recent-pack-section')">Recent Pack</div>
  <div class="sidebar-btn" onclick="showSection('collection-section')">Collection</div>
</div>

<div id="main-content">
  <div id="pack-opener" class="section active">
    <h1>First Generation RCY</h1>
    <div id="rcy-box">RCY</div>
    <p>Tokens: <span id="tokens">0</span></p>
    <div>
      <button class="open-btn" onclick="openPack(1)">Open 1 Pack (10 Tokens)</button>
      <button class="open-btn" onclick="openPack(5)">Open 5 Packs (20 Tokens)</button>
      <button class="open-btn" onclick="openPack(10)">Open 10 Packs (50 Tokens)</button>
      <button class="open-btn" onclick="openPack(20)">Open 20 Packs (100 Tokens)</button>
      <button class="open-btn" onclick="openPack(30)">Open 30 Packs (200 Tokens)</button>
    </div>
  </div>

  <div id="recent-pack-section" class="section">
    <h2>Recently Opened Pack</h2>
    <div id="recent-pack"></div>
  </div>

  <div id="collection-section" class="section">
    <h2>Collection</h2>
    <div id="collection"></div>
  </div>
</div>

<div id="card-modal">
  <div id="card-modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <img id="modal-img" src="" alt="">
    <h3 id="modal-name"></h3>
    <p id="modal-type"></p>
    <p id="modal-atkdef"></p>
    <p id="modal-effect"></p>
  </div>
</div>

<script>
  // Navigation
  function showSection(id) {
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // Token System
  let tokens = parseInt(localStorage.getItem('tokens')) || 0;
  let lastLogin = localStorage.getItem('lastLogin');
  let today = new Date().toDateString();
  if(!localStorage.getItem('firstTime')) { tokens+=1000; localStorage.setItem('firstTime','done'); }
  if(lastLogin!==today) { tokens+=10; localStorage.setItem('lastLogin',today);}
  document.getElementById('tokens').innerText=tokens;
  localStorage.setItem('tokens', tokens);

  // Card Pool
  const cardPool = [
    {name:"Byteblade Initiate", type:"Level 3 DARK Cyberse", atkdef:"ATK 1200 / DEF 800", effect:"If you control no monsters: Special Summon from hand. If sent to GY: add 1 'Byteblade' card from Deck. Once per turn.", imageUrl:""},
    {name:"Byteblade Slicer", type:"Level 4 DARK Cyberse", atkdef:"ATK 1500 / DEF 1000", effect:"Special Summon if only Byteblade monsters. Normal/Special Summon: Special Summon 1 Byteblade from hand/GY. Once per turn.", imageUrl:""},
    {name:"Byteblade Vanguard", type:"Level 2 DARK Cyberse", atkdef:"ATK 1000 / DEF 1000", effect:"Banish from GY: Add 1 Byteblade Spell from Deck. Once per turn.", imageUrl:""},
    {name:"Byteblade Root Access Kernel", type:"Level 4 Tuner DARK Cyberse", atkdef:"ATK 1800 / DEF 0", effect:"Send 1 Cyberse from Deck to GY; Special Summon this from hand. Cannot Extra Deck Summon non-Byteblade Links this turn. Normal/Special Summon: Add 1 Byteblade from GY. Once per effect per turn.", imageUrl:""},
    {name:"Byteblade Crusader", type:"Level 6 DARK Cyberse", atkdef:"ATK 2000 / DEF 1800", effect:"Quick Effect: Send 1 other Byteblade from hand/field to GY; Special Summon this from hand. Normal/Special Summon: Special Summon 1 Byteblade from Deck (except Crusader). Link material: can use hand monsters for Byteblade Link Summon this turn. Once per effect per turn.", imageUrl:""},
    {name:"Redzone Byteblade Imposter", type:"Level 4 FIRE Machine", atkdef:"ATK 0 / DEF 2000", effect:"Normal/Special Summon: Add 1 Redzone/Ignition Spell or 1 Byteblade Monster. Sent to GY while controlling FIRE Machine/Cyberse: Special Summon it, negate effects. End Phase: Banish to destroy 1 opponent card. Once per effect per turn.", imageUrl:""},
    {name:"Byteblade Hacker", type:"Link 2 DARK Cyberse", atkdef:"ATK 2000", effect:"2 Cyberse monsters. Link Summon: Special Summon 1 Byteblade Link from GY. Cyberse Special Summoned to this zone: Draw 1. Once per effect per turn.", imageUrl:""},
    {name:"Byteblade Encoder", type:"Link 2 DARK Cyberse", atkdef:"ATK 2200", effect:"2 Cyberse including 1 Byteblade. Discard 1: Add 1 Byteblade from Deck. Main Phase: Special Summon 1 Byteblade from Deck to zone, negate effects. Cannot Extra Deck Summon non-Cyberse Links. Once per effect per turn.", imageUrl:""},
    {name:"Byteblade Overclock", type:"Link 3 DARK Cyberse", atkdef:"ATK 2800", effect:"2+ Cyberse including 1 Byteblade Tuner. Link Summon: Special Summon 1 Byteblade from GY to zone, negate effects. Quick Effect: Opponent activates monster/Spell/Trap: send 1 Cyberse from hand/Deck to GY; negate and destroy. Once per effect per turn.", imageUrl:""},
    {name:"Byteblade System Dragbit", type:"Link 4 DARK Cyberse", atkdef:"ATK 3000", effect:"3+ Cyberse including 1 Link-2 and 1 Effect. Link Summon: Special Summon up to 2 Byteblade from GY to zones. Control another Byteblade Link: opponent monsters summoned DEF & negated. Quick Effect: Destroy 1 Cyberse or banish 1 Byteblade GY to negate opponent Spell/Trap. End Phase: Destroy 1 monster this points to. Once per effect per turn.", imageUrl:"https://www.duelingbook.com/card?id=5619533"}
  ];

  function updateCollectionDisplay() {
    const collectionDiv = document.getElementById('collection');
    let collection = JSON.parse(localStorage.getItem('collection')) || [];
    collectionDiv.innerHTML = "";
    collection.forEach(name=>{
      const card = cardPool.find(c=>c.name===name);
      if(card){
        const img = document.createElement('img');
        img.src = card.imageUrl || "";
        img.alt = card.name;
        img.className='card';
        img.onclick=()=>showModal(card);
        collectionDiv.appendChild(img);
      }
    });
  }

  function showModal(card){
    document.getElementById('modal-img').src = card.imageUrl || "";
    document.getElementById('modal-name').innerText = card.name;
    document.getElementById('modal-type').innerText = card.type || "";
    document.getElementById('modal-atkdef').innerText = card.atkdef || "";
    document.getElementById('modal-effect').innerText = card.effect || "";
    document.getElementById('card-modal').style.display = 'flex';
  }
  function closeModal(){ document.getElementById('card-modal').style.display='none'; }

  function openPack(packCount){
    let cost=0;
    if(packCount===1) cost=10;
    else if(packCount===5) cost=20;
    else if(packCount===10) cost=50;
    else if(packCount===20) cost=100;
    else if(packCount===30) cost=200;
    if(tokens<cost){alert("Not enough tokens!"); return;}
    tokens-=cost;
    localStorage.setItem('tokens',tokens);
    document.getElementById('tokens').innerText=tokens;

    const recentDiv = document.getElementById('recent-pack');
    recentDiv.innerHTML="";

    for(let i=0;i<5*packCount;i++){
      const card = cardPool[Math.floor(Math.random()*cardPool.length)];
      const img = document.createElement('img');
      img.src = card.imageUrl || "";
      img.alt = card.name;
      img.className='card';
      img.onclick=()=>showModal(card);
      recentDiv.appendChild(img);

      let collection = JSON.parse(localStorage.getItem('collection')) || [];
      collection.push(card.name);
      localStorage.setItem('collection',JSON.stringify(collection));
    }

    updateCollectionDisplay();
    showSection('recent-pack-section');
  }

  updateCollectionDisplay();
</script>
</body>
</html>
