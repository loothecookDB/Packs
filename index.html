<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Generation RCY Pack Opener</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: #fff;
    text-align: center;
    margin: 0;
    padding: 0;
  }

  h1 {
    margin-top: 20px;
    color: #ffcc00;
  }

  /* RCY Box */
  #rcy-box {
    margin: 50px auto;
    width: 150px;
    height: 150px;
    background: black;
    border: 3px solid #ff0000;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    cursor: pointer;
    transition: transform 0.5s;
  }

  #rcy-box:hover {
    transform: rotateY(360deg);
  }

  /* Pack */
  #pack {
    display: none;
    margin: 20px auto;
    width: 100px;
    height: 150px;
    background: black;
    color: #fff;
    font-size: 48px;
    border: 2px solid #fff;
    border-radius: 5px;
    align-items: center;
    justify-content: center;
  }

  /* Card display */
  #card-display img {
    max-width: 200px;
    margin: 10px;
    border: 2px solid #fff;
    border-radius: 5px;
  }

  button {
    margin: 5px;
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
  }

  #celebration {
    display: none;
    color: #00ff00;
    font-size: 24px;
    margin: 10px;
  }
</style>
</head>
<body>

<h1>First Generation RCY</h1>

<div id="rcy-box">RCY</div>

<div id="pack">1</div>

<p>Tokens: <span id="tokens">0</span></p>

<div>
  <button onclick="openPack(1)">Open 1 Pack (10 Tokens)</button>
  <button onclick="openPack(5)">Open 5 Packs (20 Tokens)</button>
  <button onclick="openPack(10)">Open 10 Packs (50 Tokens)</button>
  <button onclick="openPack(20)">Open 20 Packs (100 Tokens)</button>
  <button onclick="openPack(30)">Open 30 Packs (200 Tokens)</button>
</div>

<div id="celebration">🎉 You got a card! 🎉</div>

<div id="card-display"></div>

<script>
  // Card pool example
  const cardPool = [
    {
      name: "Byteblade Initiate",
      type: "Monster",
      imageUrl: "", // add your image link here
    },
    {
      name: "Byteblade System Dragbit",
      type: "Monster",
      imageUrl: "", // add your image link here
    }
  ];

  let tokens = 0;

  function openPack(count) {
    const costPerPack = {
      1: 10,
      5: 20,
      10: 50,
      20: 100,
      30: 200
    };

    const cost = costPerPack[count];
    if (cost === undefined) {
      alert("Invalid pack count");
      return;
    }

    tokens += cost;
    document.getElementById("tokens").textContent = tokens;

    for (let i = 0; i < count; i++) {
      displayCard();
    }
  }

  function displayCard() {
    const card = cardPool[Math.floor(Math.random() * cardPool.length)];
    const cardDisplay = document.getElementById("card-display");

    const cardDiv = document.createElement("div");
    cardDiv.style.display = "inline-block";
    cardDiv.style.margin = "10px";
    cardDiv.innerHTML = `<strong>${card.name}</strong><br>${card.type}`;

    cardDisplay.appendChild(cardDiv);

    // Show celebration message
    const celebration = document.getElementById("celebration");
    celebration.style.display = "block";
    setTimeout(() => {
      celebration.style.display = "none";
    }, 2000);
  }
</script>
</body>
</html>
