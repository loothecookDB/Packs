<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCY Pack Opener & Deck Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
body {
  margin:0; padding:0;
  font-family:'Orbitron', sans-serif;
  background: url('https://cdn.discordapp.com/attachments/1398179743496536168/1483585527700652032/IMG_4088.jpeg') center/cover no-repeat fixed;
  color:#fff; display:flex; height:100vh; overflow:hidden;
}

/* Sidebar */
#sidebar {
  width:200px;
  background:rgba(0,0,0,0.85);
  border-right:2px solid #ff0000;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100%;
  box-shadow:2px 0 20px #ff0000 inset;
}
#sidebar h2 { color:#ff0000; text-shadow:0 0 10px #ff0000; font-size:1.6em; margin-bottom:30px;}
.sidebar-btn {
  width:160px;
  margin:10px 0;
  padding:10px;
  background:#111;
  border:2px solid #ff0000;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  transition:0.2s;
}
.sidebar-btn:hover {transform:scale(1.05); box-shadow:0 0 20px #ff0000,0 0 40px #ff5555 inset;}

/* Main content */
#main-content {flex:1; padding:20px; overflow-y:auto;}
.section {display:none;} .active{display:block;}
#tokens-display {
  text-align:center; margin:10px 0; padding:5px 10px; border:2px solid #ff0000; border-radius:10px; background:rgba(0,0,0,0.7);
}
#box-cover {
  width:150px; height:200px; margin:20px auto;
  background:url('https://i.imgur.com/796aviX.jpeg') center/cover no-repeat;
  border-radius:15px;
  border:3px solid #ff0000;
  box-shadow:0 0 40px #ff0000 inset,0 0 80px #ff5555;
}
#rcy-box {
  width:100px; height:160px; margin:20px auto;
  background:url('https://i.imgur.com/Zm6b8fF.png') center/cover no-repeat;
  border-radius:15px;
  border:3px solid #ff0000;
  box-shadow:0 0 40px #ff0000 inset,0 0 80px #ff5555;
  display:flex; justify-content:center; align-items:center;
  font-size:32px; font-weight:bold; color:#fff; cursor:pointer;
  position:relative; overflow:hidden; transition:0.6s;
}
#rcy-box::before {content:"1";position:absolute;top:8px;left:8px;font-size:24px;color:#fff;text-shadow:0 0 5px #ff0000;}
#rcy-box:hover {transform:rotateY(360deg) scale(1.1) rotateZ(5deg); box-shadow:0 0 60px #ff0000 inset,0 0 120px #ff7777;}
button.open-btn {
  margin:5px; padding:12px 18px; font-size:16px; cursor:pointer;
  border:2px solid #ff0000; border-radius:10px;
  background:#111; color:#fff; transition:0.2s;
}
button.open-btn:hover {transform:scale(1.05); box-shadow:0 0 20px #ff0000,0 0 40px #ff5555 inset;}

/* Cards */
#recent-pack, #collection, #deck-builder-pool, #deck-builder-deck {
  display:flex; flex-wrap:wrap; justify-content:center; max-width:900px; margin-top:20px;
}
.card-slot {width:120px;height:160px;margin:10px; perspective:1000px; cursor:pointer;}
.card-inner {
  position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform 0.8s;
}
.card-inner.flipped {transform:rotateY(180deg);}
.card-face {
  position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:8px;
  border:2px solid #fff; display:flex;justify-content:center;align-items:center; overflow:hidden;
}
.card-front {background:#222;}
.card-back {transform:rotateY(180deg); background-size:cover; background-position:center;}
.sr {box-shadow:0 0 15px gold inset;}
.ur {box-shadow:0 0 15px red inset; animation:shake 0.5s infinite;}
.uncollected {opacity:0.3;}
.collected {opacity:1;}

/* Modal */
#card-modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.95); justify-content:center; align-items:center; z-index:999;
}
#card-modal-content {background:#111; padding:20px; border:2px solid #ff0000;
  border-radius:15px; color:#fff; max-width:400px; text-align:center; position:relative;
}
#card-modal-content img {max-width:200px; margin:10px;}
#card-modal-content .close {position:absolute; top:5px; right:10px; cursor:pointer; font-size:20px;}

@keyframes shake {0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
</style>
</head>
<body>

<div id="sidebar">
  <h2>RCY Menu</h2>
  <div class="sidebar-btn" onclick="showSection('pack-opener')">Pack Opener</div>
  <div class="sidebar-btn" onclick="showSection('recent-pack-section')">Recent Pack</div>
  <div class="sidebar-btn" onclick="showSection('collection-section')">Collection</div>
  <div class="sidebar-btn" onclick="showSection('deck-builder')">Deck Builder</div>
</div>

<div id="main-content">
  <div id="pack-opener" class="section active">
    <h1 style="text-align:center;">First Generation RCY</h1>
    <div id="box-cover"></div>
    <div id="rcy-box">RCY</div>
    <div id="tokens-display">Tokens: <span id="tokens">0</span></div>
    <div style="text-align:center;">
      <button class="open-btn" onclick="openPack(1)">Open 1 Pack (10 Tokens)</button>
      <button class="open-btn" onclick="openPack(5)">Open 5 Packs (20 Tokens)</button>
      <button class="open-btn" onclick="openPack(10)">Open 10 Packs (50 Tokens)</button>
      <button class="open-btn" onclick="openPack(20)">Open 20 Packs (100 Tokens)</button>
      <button class="open-btn" onclick="openPack(30)">Open 30 Packs (200 Tokens)</button>
    </div>
  </div>

  <div id="recent-pack-section" class="section">
    <h2>Recently Opened Pack</h2>
    <div id="recent-pack"></div>
  </div>

  <div id="collection-section" class="section">
    <h2>Collection</h2>
    <div id="collection"></div>
  </div>

  <div id="deck-builder" class="section">
    <h2>Deck Builder</h2>
    <h3>Card Pool</h3>
    <div id="deck-builder-pool"></div>
    <h3>Your Deck</h3>
    <div id="deck-builder-deck"></div>
  </div>
</div>

<div id="card-modal">
  <div id="card-modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <img id="modal-img" src="" alt="">
    <h3 id="modal-name"></h3>
    <p id="modal-type"></p>
    <p id="modal-atkdef"></p>
    <p id="modal-effect"></p>
  </div>
</div>

<!-- Sounds -->
<audio id="packSound" src="https://freesound.org/data/previews/256/256113_3263906-lq.mp3"></audio>
<audio id="flipSound" src="https://freesound.org/data/previews/341/341695_3248240-lq.mp3"></audio>
<audio id="rareSound" src="https://freesound.org/data/previews/141/141644_1871006-lq.mp3"></audio>

<script>
// ---------------- NAVIGATION ----------------
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ---------------- TOKEN SYSTEM ----------------
let tokens = parseInt(localStorage.getItem('tokens'))||0;
if(!localStorage.getItem('firstTime')){
  tokens += 1000;
  localStorage.setItem('firstTime','done');
  alert("🎉 First login bonus! 1000 tokens!");
}
let lastLogin = localStorage.getItem('lastLogin');
let today = new Date().toDateString();
if(lastLogin!==today){
  tokens+=10;
  localStorage.setItem('lastLogin',today);
}
document.getElementById('tokens').innerText = tokens;
localStorage.setItem('tokens',tokens);

// ---------------- CARD POOL ----------------
const cardPool=[
{name:"Meno the Water Witch", type:"Link 1 WATER Spellcaster", atkdef:"ATK 500", effect:"1 monster <=1000 ATK or 1 Spellcaster. Spell counter boosts ATK. Quick Effect: Remove 3 counters to Special Summon 1 Level 4 or lower from hand. Once per turn.", imageUrl:"https://i.imgur.com/mst9ADC.jpeg", rarity:"SR"},
{name:"Windy Breeze Mia", type:"Link 1 WIND Warrior", atkdef:"ATK 700", effect:"Link Summon: Discard 1 card; gain 1 additional Normal Summon for WIND monster. Used as Link material: add 1 WIND monster from Deck. Once per turn.", imageUrl:"https://i.imgur.com/efgGdFr.jpeg", rarity:"R"},
{name:"Shimmering Summer Breeze", type:"Level 3 LIGHT Winged Beast Tuner", atkdef:"ATK 0 / DEF 1300", effect:"Quick Effect: When a card/effect activates with certain effects, discard this card; negate effect. Once per turn.", imageUrl:"https://i.imgur.com/Rki26bX.jpeg", rarity:"SR"},
{name:"D-Lord", type:"Level 8 DARK Fiend", atkdef:"ATK 2300 / DEF 2000", effect:"Special Summon by sending 1 card from hand/field. Normal/Special Summon: banish 1 monster from GY; add 1 monster from Deck same attribute. Opponent turn GY: send 1 card field to GY; Special Summon this card. Once per turn.", imageUrl:"https://i.imgur.com/xm80gU6.jpeg", rarity:"UR"}
// add older Byteblade cards here...
];

// ---------------- COLLECTION ----------------
function updateCollectionDisplay(){
  const collectionDiv = document.getElementById('collection');
  let collection = JSON.parse(localStorage.getItem('collection'))||[];
  collectionDiv.innerHTML="";
  cardPool.forEach(card=>{
    const slot=document.createElement('div'); slot.className='card-slot';
    const inner=document.createElement('div'); inner.className='card-inner flipped';
    inner.innerHTML=`<div class="card-face card-front"></div>
      <div class="card-face card-back ${card.rarity=='SR'?'sr':card.rarity=='UR'?'ur':''}">
      <img src="${card.imageUrl}" alt="${card.name}"></div>`;
    if(collection.includes(card.name)) inner.classList.remove('flipped');
    inner.onclick=()=>showModal(card);
    slot.appendChild(inner); collectionDiv.appendChild(slot);
  });
}
updateCollectionDisplay();

// ---------------- DECK BUILDER ----------------
function updateDeckBuilder(){
  const poolDiv=document.getElementById('deck-builder-pool');
  const deckDiv=document.getElementById('deck-builder-deck');
  let collection=JSON.parse(localStorage.getItem('collection'))||[];
  let deck=JSON.parse(localStorage.getItem('deck'))||[];
  poolDiv.innerHTML=""; deckDiv.innerHTML="";
  cardPool.forEach(card=>{
    const slot=document.createElement('div'); slot.className='card-slot';
    const inner=document.createElement('div'); inner.className='card-inner flipped';
    inner.innerHTML=`<div class="card-face card-front"></div>
      <div class="card-face card-back ${card.rarity=='SR'?'sr':card.rarity=='UR'?'ur':''}">
      <img src="${card.imageUrl}" alt="${card.name}"></div>`;
    if(collection.includes(card.name)){ inner.classList.remove('flipped'); inner.classList.add('collected'); }
    else inner.classList.add('uncollected');
    inner.onclick=()=>{
      if(!collection.includes(card.name)){ alert("You haven't collected this card!"); return; }
      if(deck.includes(card.name)){ alert("Card already in deck"); return; }
      if(deck.length>=40){ alert("Deck is full (40 cards max)"); return; }
      deck.push(card.name); localStorage.setItem('deck',JSON.stringify(deck)); updateDeckBuilder();
    };
    slot.appendChild(inner); poolDiv.appendChild(slot);
  });
  deck.forEach(name=>{
    const card=cardPool.find(c=>c.name===name);
    const slot=document.createElement('div'); slot.className='card-slot';
    const inner=document.createElement('div'); inner.className='card-inner';
    inner.innerHTML=`<div class="card-face card-front"></div>
      <div class="card-face card-back ${card.rarity=='SR'?'sr':card.rarity=='UR'?'ur':''}">
      <img src="${card.imageUrl}" alt="${card.name}"></div>`;
    inner.onclick=()=>{ deck=deck.filter(c=>c!==name); localStorage.setItem('deck',JSON.stringify(deck)); updateDeckBuilder(); };
    slot.appendChild(inner); deckDiv.appendChild(slot);
  });
}
updateDeckBuilder();

// ---------------- MODAL ----------------
function showModal(card){
  document.getElementById('modal-img').src=card.imageUrl;
  document.getElementById('modal-name').innerText=card.name;
  document.getElementById('modal-type').innerText=card.type;
  document.getElementById('modal-atkdef').innerText=card.atkdef;
  document.getElementById('modal-effect').innerText=card.effect;
  document.getElementById('card-modal').style.display='flex';
}
function closeModal(){ document.getElementById('card-modal').style.display='none'; }

// ---------------- PACK OPENING ----------------
function openPack(packCount){
  let cost=packCount==1?10:packCount==5?20:packCount==10?50:packCount==20?100:200;
  if(tokens<cost){ alert("Not enough tokens!"); return; }
  tokens-=cost; localStorage.setItem('tokens',tokens);
  document.getElementById('tokens').innerText=tokens;
  const recentDiv=document.getElementById('recent-pack'); recentDiv.innerHTML="";
  document.getElementById('packSound').play();
  let collection=JSON.parse(localStorage.getItem('collection'))||[];
  let firstOpen=true;

  for(let i=0;i<packCount;i++){
    for(let j=0;j<5;j++){
      let rarityRoll=Math.random();
      let cardCandidates=cardPool.filter(c=>c.rarity=="N");
      if(rarityRoll<0.1) cardCandidates=cardPool.filter(c=>c.rarity=="R");
      if(rarityRoll<0.03) cardCandidates=cardPool.filter(c=>c.rarity=="SR");
      if(rarityRoll<0.01) cardCandidates=cardPool.filter(c=>c.rarity=="UR");
      const card=cardCandidates[Math.floor(Math.random()*cardCandidates.length)];

      const slot=document.createElement('div'); slot.className='card-slot';
      const inner=document.createElement('div'); inner.className='card-inner flipped';
      inner.innerHTML=`<div class="card-face card-front"></div>
        <div class="card-face card-back ${card.rarity=='SR'?'sr':card.rarity=='UR'?'ur':''}">
        <img src="${card.imageUrl}" alt="${card.name}"></div>`;
      slot.appendChild(inner); recentDiv.appendChild(slot);

      setTimeout(()=>{
        inner.classList.remove('flipped'); document.getElementById('flipSound').play();
        if(card.rarity=='UR'){ document.getElementById('rareSound').play(); inner.style.animation='shake 0.5s infinite'; }
        if(!collection.includes(card.name)) collection.push(card.name);
        if(firstOpen){ alert("🎉 You got your first card!"); firstOpen=false; }
        localStorage.setItem('collection',JSON.stringify(collection));
        updateCollectionDisplay(); updateDeckBuilder();
      },i*1000+j*400);
    }
  }
}
</script>
</body>
</html>
